updates:
- directory: /
  groups:
    aws-sdk:
      patterns:
      - "@aws-sdk/*"
      - "@smithy/*"
    linting:
      patterns:
      - oxlint
    testing:
      patterns:
      - vitest
      - "@vitest/*"
      - "@testcontainers/*"
      - testcontainers
    typescript-tooling:
      patterns:
      - typescript
      - tsdown
  open-pull-requests-limit: 10
  package-ecosystem: npm
  schedule:
    day: monday
    interval: weekly
- directory: /
  ignore:
  - dependency-name: "github/gh-aw-actions*"
  - dependency-name: "github/gh-aw-actions" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  open-pull-requests-limit: 5
  package-ecosystem: github-actions
  schedule:
    day: monday
    interval: weekly
version: 2
