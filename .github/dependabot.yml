version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
          - "@smithy/*"
      typescript-tooling:
        patterns:
          - "typescript"
          - "typescript-eslint"
          - "tsdown"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testcontainers/*"
          - testcontainers
      linting:
        patterns:
          - "eslint"
          - "@eslint/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
