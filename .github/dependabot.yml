version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
          - "@smithy/*"
      typescript-tooling:
        patterns:
          - "typescript"
          - "typescript-eslint"
          - "ts-jest"
          - "ts-node"
          - "tsdown"
      testing:
        patterns:
          - "jest"
          - "@types/jest"
          - "testcontainers"
      linting:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-plugin-*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
